<style>


*{

margin:0;
padding:0;
box-sizing:border-box;

}



html,
body{


width:100%;

height:100%;


overflow:hidden;


background:#000;


color:white;


font-family:

"Pretendard",
"Noto Sans KR",
Arial,
sans-serif;


}





/* ===========================
   깊은 우주
=========================== */


body{


background:


radial-gradient(
circle at 45% 45%,
rgba(45,70,150,.08),
transparent 38%
),


radial-gradient(
circle at 75% 70%,
rgba(100,50,160,.05),
transparent 45%
),


radial-gradient(
circle at center,
#090d18,
#020309 60%,
#000 95%
);


}





.space{


position:absolute;


width:100%;


height:100%;



perspective:1500px;


overflow:hidden;


}






.star{


position:absolute;


left:50%;


top:50%;


border-radius:50%;


background:white;


}







/* 먼 별 */


.star.normal{


opacity:.5;


animation:

normalMove linear infinite;


}



@keyframes normalMove{


from{


transform:

translate3d(
0,
0,
-1300px
)

scale(.3);



}



to{


transform:

translate3d(
30px,
150px,
700px
)

scale(2);



opacity:0;



}



}






/* 가까운 별 */


.star.warp{


opacity:0;


animation:

warpMove linear infinite;


}



@keyframes warpMove{


0%{


transform:

translate3d(
0,
0,
-1500px
)

scale(.2);


opacity:0;


}



35%{


opacity:.8;


}



100%{


transform:

translate3d(
60px,
260px,
1200px
)

scale(7);



opacity:0;


}



}





/* ===========================
   차원문
=========================== */


.portal{


position:absolute;


left:50%;


top:50%;


width:600px;


height:600px;



transform:

translate(-50%,-50%);



background:


radial-gradient(
circle,

rgba(90,130,255,.15),

transparent 65%

);



filter:

blur(45px);



animation:

portalPulse 10s infinite;



}




@keyframes portalPulse{


0%,
100%{


opacity:.2;


scale:1;


}



50%{


opacity:.45;


scale:1.25;


}


}


/* ===========================
   메인 콘텐츠
=========================== */


.content{


position:absolute;


width:100%;


height:100%;



display:flex;


flex-direction:column;


justify-content:center;


align-items:center;



text-align:center;



}





.brand{


font-size:70px;


font-weight:900;


letter-spacing:18px;


color:#eeeeee;



animation:

fadeIn 3s ease;


}





.subtitle{


margin-top:20px;


font-size:18px;


letter-spacing:5px;


color:#777;



animation:

fadeIn 5s ease;


}





/* ===========================
   프로젝트 카드
=========================== */


.project{


display:block;


margin-top:80px;


padding:40px 70px;


border-radius:30px;



text-decoration:none;


color:white;


cursor:pointer;




background:

rgba(255,255,255,.035);



border:

1px solid rgba(255,255,255,.12);



backdrop-filter:

blur(20px);




transition:

transform .4s ease,
background .4s ease,
border-color .4s ease;



animation:

float 6s infinite;


}




.project:hover{


transform:

translateY(-20px)
scale(1.03);



background:

rgba(255,255,255,.07);



border-color:

rgba(255,255,255,.35);



}




.chapter{


font-size:13px;


letter-spacing:5px;


color:#777;


}




.project h2{


margin-top:15px;


font-size:42px;


font-weight:800;


}




.project p{


margin-top:12px;


color:#888;


}





.enter{


margin-top:20px;


font-size:12px;


letter-spacing:4px;


color:#999;


}





.loading{


position:absolute;


bottom:45px;


font-size:13px;


letter-spacing:4px;


color:#555;


}





@keyframes fadeIn{


from{


opacity:0;


transform:

translateY(40px);



}


to{


opacity:1;


transform:

translateY(0);



}



}





@keyframes float{


0%,
100%{


transform:

translateY(0);


}



50%{


transform:

translateY(-12px);



}



}





@media(max-width:700px){


.brand{


font-size:38px;


letter-spacing:10px;


}



.subtitle{


font-size:12px;


}



.project{


padding:30px;


margin-top:50px;


}



.project h2{


font-size:30px;


}


}





</style>


</head>





<body>




<div class="space" id="space"></div>



<div class="portal"></div>





<div class="content">



<div class="brand">

GGULVERSE

</div>




<div class="subtitle">

A NEW UNIVERSE BEGINS

</div>





<a href="https://ggulverse.github.io/everycalc/"
class="project">



<div class="chapter">

CHAPTER 01

</div>




<h2>

EveryCalc

</h2>




<p>

Every Calculation in One Place

</p>




<div class="enter">

</div>




</a>





<div class="loading">

ENTERING GGULVERSE...

</div>




</div>








<script>


const space =
document.getElementById("space");





// =================================
// Layer 1
// 아주 먼 우주 별
// =================================

for(let i=0; i<120; i++){

    const star = document.createElement("div");

    star.className = "star normal";


    const size = Math.random()*1.2 + 0.3;

    star.style.width = size + "px";
    star.style.height = size + "px";


    star.style.opacity =
        Math.random()*0.35 + 0.15;


    star.style.left =
        Math.random()*100 + "%";

    star.style.top =
        Math.random()*100 + "%";


    star.style.animationDuration =
        (18 + Math.random()*15) + "s";


    star.style.animationDelay =
        Math.random()*15 + "s";


    space.appendChild(star);

}




// =================================
// Layer 2
// 중간 거리 별
// =================================

for(let i=0; i<40; i++){

    const star = document.createElement("div");

    star.className = "star normal";


    const size =
        Math.random()*2 + 0.8;


    star.style.width =
        size + "px";

    star.style.height =
        size + "px";


    star.style.opacity =
        Math.random()*0.4 + 0.4;



    star.style.left =
        Math.random()*100 + "%";


    star.style.top =
        Math.random()*100 + "%";



    star.style.animationDuration =
        (10 + Math.random()*8) + "s";



    star.style.animationDelay =
        Math.random()*8 + "s";



    space.appendChild(star);

}





// =================================
// Layer 3
// 가까운 상승 별
// =================================

for(let i=0; i<10; i++){

    const star = document.createElement("div");

    star.className = "star warp";


    const size =
        Math.random()*3 + 1.5;



    star.style.width =
        size + "px";


    star.style.height =
        size + "px";



    star.style.left =
        Math.random()*100 + "%";



    star.style.top =
        Math.random()*100 + "%";



    star.style.animationDuration =
        (4 + Math.random()*4) + "s";



    star.style.animationDelay =
        Math.random()*12 + "s";



    space.appendChild(star);

}







// 10초 후 EveryCalc 이동


setTimeout(()=>{


location.href =

"https://ggulverse.github.io/everycalc/";


},10000);




</script>
