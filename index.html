<style>


*{

margin:0;
padding:0;
box-sizing:border-box;

}



html,
body{

width:100%;
height:100%;

overflow:hidden;

background:#000;

color:white;

font-family:

"Pretendard",
"Noto Sans KR",
Arial,
sans-serif;

}





/* ===========================
   성운 배경
=========================== */


body{

background:


radial-gradient(
circle at 35% 40%,
rgba(80,120,255,.16),
transparent 35%
),


radial-gradient(
circle at 75% 65%,
rgba(160,90,255,.12),
transparent 40%
),


radial-gradient(
circle at center,
#111b35,
#05060c 55%,
#000 90%
);


}





/* ===========================
   우주 공간
=========================== */


.space{


position:absolute;

width:100%;

height:100%;


perspective:1400px;


overflow:hidden;


}






/* ===========================
   별 기본
=========================== */


.star{


position:absolute;


left:50%;

top:50%;


border-radius:50%;


background:white;


opacity:.8;


}





/*
일반 별 이동
*/


.star.normal{


animation:

moveStar linear infinite;


}




@keyframes moveStar{


from{


transform:

translate3d(0,0,-1200px)

scale(.5);


}



to{


transform:

translate3d(50px,-80px,700px)

scale(2);


}


}





/*
워프 별
*/


.star.warp{


animation:

warpStar linear infinite;


}




@keyframes warpStar{


from{


transform:

translate3d(0,0,-1400px)

scale(.3);


opacity:0;


}



30%{


opacity:1;


}




to{


transform:

translate3d(
120px,
-280px,
1200px
)

scale(7);


opacity:0;


}


}




/* ===========================
 워프 잔상
=========================== */


.star.warp::after{


content:"";


position:absolute;


width:var(--trail);


height:1px;


right:100%;


top:50%;


transform:

translateY(-50%);



background:

linear-gradient(
to left,
rgba(255,255,255,.8),
transparent
);


opacity:.7;


}

/* ===========================
   중앙 워프 빛
=========================== */


.portal{


position:absolute;


left:50%;

top:50%;


width:650px;

height:650px;


transform:

translate(-50%,-50%);



background:


radial-gradient(
circle,
rgba(100,150,255,.32),
transparent 65%
);



filter:

blur(40px);



animation:

portalPulse 8s infinite;



}




@keyframes portalPulse{


0%,
100%{


opacity:.35;

scale:1;


}



50%{


opacity:.65;

scale:1.35;


}


}






/* ===========================
   콘텐츠
=========================== */


.content{


position:absolute;


width:100%;

height:100%;



display:flex;


flex-direction:column;


justify-content:center;


align-items:center;



text-align:center;



}




.brand{


font-size:70px;


font-weight:900;


letter-spacing:18px;



animation:

appear 2.5s ease;


}




.subtitle{


margin-top:20px;


font-size:18px;


letter-spacing:5px;


color:#aaa;



animation:

appear 4s ease;


}





.project{


margin-top:80px;


padding:40px 70px;


border-radius:30px;



background:

rgba(255,255,255,.05);



border:

1px solid rgba(255,255,255,.15);



backdrop-filter:

blur(20px);



animation:

float 5s infinite;


}




.chapter{


font-size:13px;


letter-spacing:5px;


color:#888;


}




.project h2{


margin-top:15px;


font-size:42px;


}



.project p{


margin-top:10px;


color:#aaa;


}





.loading{


position:absolute;


bottom:45px;


font-size:14px;


letter-spacing:3px;


color:#777;


}






/* ===========================
   등장
=========================== */


@keyframes appear{


from{


opacity:0;


transform:

translateY(40px);


}


to{


opacity:1;


transform:

translateY(0);


}


}




@keyframes float{


0%,
100%{


transform:

translateY(0);


}



50%{


transform:

translateY(-15px);


}


}





/* ===========================
   모바일
=========================== */


@media(max-width:700px){



.brand{


font-size:38px;


letter-spacing:10px;


}



.subtitle{


font-size:12px;


}



.project{


padding:30px;


}



.project h2{


font-size:30px;


}



}




</style>


</head>




<body>




<div class="space" id="space"></div>


<div class="portal"></div>




<div class="content">



<div class="brand">

GGULVERSE

</div>



<div class="subtitle">

A NEW UNIVERSE BEGINS

</div>



<div class="project">


<div class="chapter">

CHAPTER 01

</div>


<h2>

EveryCalc

</h2>


<p>

Every Calculation in One Place

</p>


</div>




<div class="loading">

ENTERING GGULVERSE...

</div>


</div>







<script>


const space =
document.getElementById("space");





/*

뒤쪽 일반 별

*/


for(let i=0;i<130;i++){



const star =
document.createElement("div");



star.className =
"star normal";



const size =
Math.random()*2+0.5;



star.style.width =
size+"px";


star.style.height =
size+"px";



star.style.left =
Math.random()*100+"%";


star.style.top =
Math.random()*100+"%";



star.style.animationDuration =
(8+Math.random()*8)+"s";



star.style.animationDelay =
Math.random()*10+"s";



space.appendChild(star);


}







/*

빠른 워프 별

*/


for(let i=0;i<25;i++){



const star =
document.createElement("div");



star.className =
"star warp";



const size =
Math.random()*3+1;



star.style.width =
size+"px";


star.style.height =
size+"px";



star.style.left =
Math.random()*100+"%";


star.style.top =
Math.random()*100+"%";



star.style.animationDuration =
(3+Math.random()*4)+"s";



star.style.animationDelay =
Math.random()*8+"s";



star.style.setProperty(
"--trail",
(20+Math.random()*70)+"px"
);



space.appendChild(star);


}






/*

10초 후 EveryCalc 이동

*/


setTimeout(()=>{


location.href =
"https://ggulverse.github.io/everycalc/";


},10000);



</script>




</body>

</html>
