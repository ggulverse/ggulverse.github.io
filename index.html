<style>


*{

margin:0;
padding:0;
box-sizing:border-box;

}



html,
body{

width:100%;

height:100%;


overflow:hidden;


background:#000;


color:white;


font-family:

"Pretendard",
"Noto Sans KR",
Arial,
sans-serif;


}





/* ===========================
   깊은 우주 배경
=========================== */


body{


background:


radial-gradient(
circle at 45% 45%,
rgba(45,70,150,.10),
transparent 35%
),



radial-gradient(
circle at 75% 70%,
rgba(90,40,160,.06),
transparent 40%
),



radial-gradient(
circle at center,
#0b1020,
#03040a 55%,
#000 90%
);



}





/* ===========================
   우주 공간
=========================== */


.space{


position:absolute;


width:100%;


height:100%;



perspective:1500px;



overflow:hidden;


}





/* ===========================
   별
=========================== */


.star{


position:absolute;


left:50%;


top:50%;


border-radius:50%;


background:white;


}





/* 일반 별 */


.star.normal{


animation:

normalMove linear infinite;


opacity:.6;


}




@keyframes normalMove{


from{


transform:

translate3d(
0,
0,
-1200px
)

scale(.4);


}



to{


transform:

translate3d(
60px,
-120px,
700px
)

scale(2);


opacity:0;


}


}





/* 접근하는 별 */


.star.warp{


animation:

warpMove linear infinite;


opacity:0;


}




@keyframes warpMove{


0%{


transform:

translate3d(
0,
0,
-1500px
)

scale(.2);


opacity:0;


}




35%{


opacity:.8;


}





100%{


transform:

translate3d(
100px,
-320px,
1200px
)

scale(7);


opacity:0;


}



}




/* ===========================
   중앙의 문
=========================== */


.portal{


position:absolute;


left:50%;


top:50%;


width:600px;


height:600px;



transform:

translate(-50%,-50%);



background:


radial-gradient(

circle,

rgba(90,130,255,.18),

transparent 65%

);



filter:

blur(45px);



animation:

portalPulse 10s infinite;


}





@keyframes portalPulse{


0%,
100%{


opacity:.25;


scale:1;


}



50%{


opacity:.5;


scale:1.25;


}


}




/* ===========================
   콘텐츠
=========================== */


.content{


position:absolute;


width:100%;


height:100%;



display:flex;


flex-direction:column;



justify-content:center;



align-items:center;



text-align:center;


}




.brand{


font-size:70px;



font-weight:900;



letter-spacing:18px;



color:#eeeeee;



animation:

fadeIn 3s ease;


}




.subtitle{


margin-top:20px;



font-size:18px;



letter-spacing:5px;



color:#888;



animation:

fadeIn 5s ease;


}





.project{


margin-top:80px;



padding:40px 70px;



border-radius:30px;




background:

rgba(255,255,255,.035);



border:

1px solid rgba(255,255,255,.12);



backdrop-filter:

blur(20px);




animation:

float 6s infinite;


}





.chapter{


font-size:13px;



letter-spacing:5px;



color:#777;



}




.project h2{


margin-top:15px;



font-size:42px;



font-weight:800;


}




.project p{


margin-top:12px;



color:#888;



}





.loading{


position:absolute;


bottom:45px;



font-size:13px;



letter-spacing:4px;



color:#555;



}





/* ===========================
   애니메이션
=========================== */


@keyframes fadeIn{


from{


opacity:0;



transform:

translateY(40px);



}



to{


opacity:1;



transform:

translateY(0);



}



}





@keyframes float{


0%,
100%{


transform:

translateY(0);



}



50%{


transform:

translateY(-12px);



}



}






/* ===========================
   모바일
=========================== */


@media(max-width:700px){



.brand{


font-size:38px;



letter-spacing:10px;



}



.subtitle{


font-size:12px;



}



.project{


padding:30px;



margin-top:50px;



}




.project h2{


font-size:30px;



}


}






</style>


</head>





<body>





<div class="space" id="space"></div>




<div class="portal"></div>




<div class="content">




<div class="brand">

GGULVERSE

</div>




<div class="subtitle">

A NEW UNIVERSE BEGINS

</div>





<div class="project">



<div class="chapter">

CHAPTER 01

</div>




<h2>

EveryCalc

</h2>




<p>

Every Calculation in One Place

</p>



</div>




<div class="loading">

ENTERING GGULVERSE...

</div>




</div>







<script>



const space =

document.getElementById("space");





// 깊은 공간의 일반 별

for(let i=0;i<120;i++){



const star =

document.createElement("div");



star.className =

"star normal";



const size =

Math.random()*2+0.5;



star.style.width =

size+"px";



star.style.height =

size+"px";



star.style.left =

Math.random()*100+"%";



star.style.top =

Math.random()*100+"%";



star.style.animationDuration =

(8+Math.random()*10)+"s";



star.style.animationDelay =

Math.random()*10+"s";



space.appendChild(star);



}





// 가끔 지나가는 가까운 별

for(let i=0;i<12;i++){



const star =

document.createElement("div");



star.className =

"star warp";



const size =

Math.random()*3+1;



star.style.width =

size+"px";



star.style.height =

size+"px";



star.style.left =

Math.random()*100+"%";



star.style.top =

Math.random()*100+"%";



star.style.animationDuration =

(4+Math.random()*5)+"s";



star.style.animationDelay =

Math.random()*10+"s";



space.appendChild(star);



}






// 10초 후 EveryCalc 이동

setTimeout(()=>{


location.href =

"https://ggulverse.github.io/everycalc/";


},10000);




</script>




</body>
