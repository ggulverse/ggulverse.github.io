<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    width:100%;
    height:100vh;

    overflow:hidden;

    background:
    radial-gradient(circle at center,
    #18213d 0%,
    #090b14 35%,
    #000 75%);

    color:white;

    font-family:
    "Pretendard",
    "Noto Sans KR",
    Arial,
    sans-serif;

}



/* 우주 별 레이어 */

.space{

    position:absolute;

    width:100%;
    height:100%;

    overflow:hidden;

}



/* 별 */

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    animation:
    moveStar 12s linear infinite;

    opacity:.7;

}


@keyframes moveStar{

    from{

        transform:
        translateY(0)
        scale(1);

    }

    to{

        transform:
        translateY(120vh)
        scale(2);

    }

}



/* 중앙 우주 포털 */

.portal{

    position:absolute;

    left:50%;
    top:50%;

    transform:
    translate(-50%,-50%);

    width:450px;
    height:450px;


    background:
    radial-gradient(
    circle,
    rgba(90,140,255,.35),
    transparent 65%
    );


    filter:blur(20px);


    animation:

    pulse 5s infinite;

}



@keyframes pulse{

    0%,100%{

        transform:
        translate(-50%,-50%)
        scale(1);

        opacity:.5;

    }


    50%{

        transform:
        translate(-50%,-50%)
        scale(1.4);

        opacity:.9;

    }

}



/* 내용 */

.content{


    position:absolute;

    width:100%;

    height:100%;


    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;


    text-align:center;


}



/* 브랜드 */

.brand{

    font-size:64px;

    font-weight:900;

    letter-spacing:15px;


    animation:

    appear 2s ease;

}



.subtitle{


    margin-top:20px;

    color:#aaa;

    letter-spacing:4px;

    animation:

    appear 3s ease;


}




.project{


    margin-top:70px;


    padding:35px 60px;


    border:

    1px solid rgba(255,255,255,.15);


    border-radius:25px;


    background:

    rgba(255,255,255,.05);


    backdrop-filter:blur(15px);


    animation:

    float 4s infinite;


}



.chapter{

    color:#888;

    letter-spacing:4px;

    font-size:13px;

}



.project h2{


    margin-top:15px;

    font-size:36px;

}



.project p{

    margin-top:10px;

    color:#aaa;

}



@keyframes float{


    0%,100%{

        transform:translateY(0);

    }


    50%{

        transform:translateY(-15px);

    }

}



@keyframes appear{


    from{

        opacity:0;

        transform:
        translateY(30px);

    }


    to{

        opacity:1;

        transform:
        translateY(0);

    }

}



.loading{


    position:absolute;

    bottom:50px;

    color:#777;

    font-size:14px;

}


</style>


</head>


<body>



<div class="space">


<div class="star" style="left:10%;animation-delay:0s"></div>
<div class="star" style="left:25%;animation-delay:3s"></div>
<div class="star" style="left:40%;animation-delay:5s"></div>
<div class="star" style="left:60%;animation-delay:2s"></div>
<div class="star" style="left:75%;animation-delay:7s"></div>
<div class="star" style="left:90%;animation-delay:4s"></div>


</div>



<div class="portal"></div>



<div class="content">


<div class="brand">

GGULVERSE

</div>


<div class="subtitle">

A NEW UNIVERSE BEGINS

</div>



<div class="project">


<div class="chapter">

</div>


<h2>

<p>

</p>


</div>

</div>


</div>



</body>
