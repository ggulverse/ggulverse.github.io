<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GGULVERSE | A New Universe Begins</title>

<meta http-equiv="refresh" content="10;url=https://ggulverse.github.io/everycalc/">


<!-- ===========================
     애드센스 코드
=========================== -->
    
<script async src="https://pagead2.googlesyndication.com/adsbygoogle.js?client=ca-pub-6952372400242875"
crossorigin="anonymous"></script>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

width:100%;
height:100vh;

overflow:hidden;

background:

radial-gradient(
circle at 50% 45%,
#17294d 0%,
#090c18 35%,
#000 80%
);

color:white;

font-family:
"Pretendard",
"Noto Sans KR",
Arial,
sans-serif;

}




.space{

position:absolute;

width:100%;
height:100%;

perspective:1200px;

overflow:hidden;

}



/* 별 */

.star{

position:absolute;

left:50%;
top:50%;

background:white;

border-radius:50%;

opacity:0;


animation:
warp 6s linear infinite;

}



/*
정면 전진 + 위쪽 대각선
*/

@keyframes warp{


0%{

transform:

translate3d(
0,
80px,
-1200px
)

scale(.2);


opacity:0;

}


20%{

opacity:.8;

}



100%{

transform:

translate3d(
120px,
-600px,
900px
)

scale(6);


opacity:0;

}


}




/* 중앙 워프 빛 */


.portal{


position:absolute;

left:50%;
top:50%;


width:600px;

height:600px;


transform:

translate(-50%,-50%);


background:

radial-gradient(

circle,

rgba(90,150,255,.35),

transparent 65%

);


filter:blur(30px);


animation:

portalPulse 7s infinite;


}




@keyframes portalPulse{


0%,100%{

scale:1;

opacity:.3;

}


50%{

scale:1.6;

opacity:.8;

}


}





.content{


position:absolute;

width:100%;

height:100%;


display:flex;

flex-direction:column;

justify-content:center;

align-items:center;


text-align:center;


}





.brand{


font-size:70px;

font-weight:900;

letter-spacing:18px;


animation:

appear 2.5s ease;


}





.subtitle{


margin-top:20px;

font-size:18px;

letter-spacing:5px;

color:#aaa;


animation:

appear 4s ease;


}




.project{


margin-top:80px;


padding:40px 70px;


border-radius:30px;


border:

1px solid rgba(255,255,255,.18);


background:

rgba(255,255,255,.06);


backdrop-filter:blur(20px);


animation:

float 5s infinite;


}





.chapter{


font-size:13px;

letter-spacing:5px;

color:#888;


}



.project h2{


margin-top:15px;

font-size:42px;


}



.project p{


margin-top:10px;

color:#aaa;


}




.loading{


position:absolute;

bottom:45px;

color:#777;

letter-spacing:3px;


}





@keyframes appear{


from{

opacity:0;

transform:
translateY(50px);

}


to{

opacity:1;

transform:
translateY(0);

}


}





@keyframes float{


0%,100%{

transform:translateY(0);

}


50%{

transform:translateY(-15px);

}


}



</style>


</head>



<body>


<div class="space" id="space"></div>


<div class="portal"></div>



<div class="content">


<div class="brand">

GGULVERSE

</div>



<div class="subtitle">

A NEW UNIVERSE BEGINS

</div>



<div class="project">


<div class="chapter">

CHAPTER 01

</div>


<h2>

EveryCalc

</h2>


<p>

Every Calculation in One Place

</p>


</div>



<div class="loading">

ENTERING GGULVERSE...

</div>


</div>




<script>


const space =
document.getElementById("space");



for(let i=0;i<120;i++){


const star =
document.createElement("div");


star.className="star";



star.style.left =
Math.random()*100+"%";


star.style.top =
Math.random()*100+"%";



const size =
Math.random()*3+1;


star.style.width =
size+"px";


star.style.height =
size+"px";



star.style.animationDuration =
(3+Math.random()*5)+"s";



star.style.animationDelay =
Math.random()*6+"s";



star.style.opacity =
Math.random();



space.appendChild(star);


}


</script>



</body>

</html>
