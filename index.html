<style>


*{

margin:0;
padding:0;
box-sizing:border-box;

}



html,
body{

width:100%;
height:100%;

overflow:hidden;


font-family:

"Pretendard",
"Noto Sans KR",
Arial,
sans-serif;


background:#000;

color:white;

}




/* ===========================
   우주 배경
=========================== */


body{


background:


radial-gradient(
circle at 30% 40%,
rgba(70,100,255,.18),
transparent 35%
),


radial-gradient(
circle at 70% 60%,
rgba(150,80,255,.15),
transparent 40%
),


radial-gradient(
circle at center,
#15233f,
#05060b 55%,
#000 90%
);



}




/* ===========================
   공간
=========================== */


.space{

position:absolute;

width:100%;

height:100%;


perspective:1200px;

overflow:hidden;

}




/* ===========================
   별
=========================== */


.star{


position:absolute;


background:white;


border-radius:50%;


opacity:0;


animation:

warp 6s linear infinite;


}




/* 별 잔상 */


.star::after{


content:"";


position:absolute;


top:50%;

right:100%;


width:40px;

height:1px;


background:

linear-gradient(
to left,
rgba(255,255,255,.8),
transparent
);


transform:

translateY(-50%);



}





/*
앞으로 돌진 + 상승
*/


@keyframes warp{


0%{


transform:


translate3d(
0,
0,
-1500px
)

scale(.2);



opacity:0;


}




25%{


opacity:1;


}



100%{


transform:


translate3d(
120px,
-350px,
1200px
)

scale(8);



opacity:0;


}



}




/* ===========================
 중앙 워프
=========================== */


.portal{


position:absolute;


left:50%;

top:50%;


width:650px;

height:650px;


transform:

translate(-50%,-50%);



background:


radial-gradient(
circle,
rgba(100,150,255,.45),
transparent 65%
);



filter:

blur(35px);



animation:

portalPulse 7s infinite;


}



@keyframes portalPulse{


0%,
100%{

scale:1;

opacity:.35;

}



50%{

scale:1.7;

opacity:.9;

}


}





/* ===========================
 내용
=========================== */


.content{


position:absolute;


width:100%;

height:100%;


display:flex;


flex-direction:column;


justify-content:center;


align-items:center;


text-align:center;


}





/* ===========================
   브랜드
=========================== */


.brand{


font-size:70px;


font-weight:900;


letter-spacing:18px;



animation:

appear 2.5s ease;


}




.subtitle{


margin-top:20px;


font-size:18px;


letter-spacing:5px;


color:#aaa;



animation:

appear 4s ease;


}





/* ===========================
   프로젝트 카드
=========================== */


.project{


margin-top:80px;


padding:40px 70px;


border-radius:30px;



border:

1px solid rgba(255,255,255,.18);



background:

rgba(255,255,255,.06);



backdrop-filter:

blur(20px);



animation:

float 5s infinite;


}




.chapter{


font-size:13px;


letter-spacing:5px;


color:#888;


}




.project h2{


margin-top:15px;


font-size:42px;


}



.project p{


margin-top:10px;


color:#aaa;


}





.loading{


position:absolute;


bottom:45px;



font-size:14px;


letter-spacing:3px;


color:#777;


}





/* 등장 효과 */


@keyframes appear{


from{


opacity:0;


transform:

translateY(50px);



}



to{


opacity:1;


transform:

translateY(0);


}


}





/* 부유 효과 */


@keyframes float{


0%,
100%{


transform:

translateY(0);


}



50%{


transform:

translateY(-15px);


}


}





/* ===========================
   모바일
=========================== */


@media(max-width:700px){



.brand{


font-size:38px;


letter-spacing:10px;


}



.subtitle{


font-size:12px;


}



.project{


padding:30px;


margin-top:50px;


}



.project h2{


font-size:30px;


}



}




</style>


</head>




<body>



<div class="space" id="space"></div>



<div class="portal"></div>




<div class="content">



<div class="brand">

GGULVERSE

</div>




<div class="subtitle">

A NEW UNIVERSE BEGINS

</div>




<div class="project">



<div class="chapter">

CHAPTER 01

</div>



<h2>

EveryCalc

</h2>



<p>

Every Calculation in One Place

</p>


</div>



<div class="loading">

ENTERING GGULVERSE...

</div>



</div>





<script>



const space =

document.getElementById("space");





/*

랜덤 우주 별 생성

*/


for(let i=0;i<150;i++){



const star =

document.createElement("div");



star.className="star";





star.style.left =

Math.random()*100+"%";



star.style.top =

Math.random()*100+"%";





const size =

Math.random()*3+1;



star.style.width =

size+"px";



star.style.height =

size+"px";





star.style.animationDuration =

(3 + Math.random()*5)+"s";





star.style.animationDelay =

Math.random()*8+"s";





space.appendChild(star);



}




</script>





</body>

</html>
