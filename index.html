<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    width:100%;
    height:100vh;

    overflow:hidden;

    background:
    radial-gradient(
    circle at center,
    #182642 0%,
    #090b15 35%,
    #000 75%
    );

    color:white;

    font-family:
    "Pretendard",
    "Noto Sans KR",
    Arial,
    sans-serif;

}



/* 우주 공간 */

.space{

    position:absolute;

    width:100%;
    height:100%;

    perspective:1000px;

    overflow:hidden;

}



/* 워프 별 */

.star{

    position:absolute;

    left:50%;
    top:50%;

    width:3px;
    height:3px;

    background:white;

    border-radius:50%;

    animation:
    warp 6s linear infinite;

    opacity:0;

}



/*
 앞으로 돌진 + 약간 위쪽 대각선
*/

@keyframes warp{


0%{

    transform:

    translate3d(
    -100px,
    120px,
    -900px
    )

    scale(.2);

    opacity:0;

}


30%{

    opacity:1;

}


100%{

    transform:

    translate3d(
    220px,
    -220px,
    700px
    )

    scale(5);

    opacity:0;

}


}



/* 별 위치 다양화 */


.star:nth-child(1){

    animation-delay:0s;

}

.star:nth-child(2){

    animation-delay:1s;

}


.star:nth-child(3){

    animation-delay:2s;

}


.star:nth-child(4){

    animation-delay:3s;

}


.star:nth-child(5){

    animation-delay:4s;

}


.star:nth-child(6){

    animation-delay:5s;

}





/* 중앙 워프 포털 */


.portal{


    position:absolute;

    left:50%;
    top:50%;


    width:500px;
    height:500px;


    transform:
    translate(-50%,-50%);


    background:

    radial-gradient(
    circle,
    rgba(100,150,255,.35),
    transparent 65%
    );


    filter:blur(25px);


    animation:

    portalMove 6s infinite;


}



@keyframes portalMove{


0%,100%{

    scale:1;

    opacity:.4;

}


50%{

    scale:1.5;

    opacity:.9;

}


}





/* 내용 */


.content{


    position:absolute;

    width:100%;
    height:100%;


    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;


    text-align:center;


}





.brand{


    font-size:64px;

    font-weight:900;

    letter-spacing:15px;


    animation:

    fadeUp 2s ease;


}





.subtitle{


    margin-top:20px;

    color:#aaa;

    letter-spacing:4px;


    animation:

    fadeUp 3s ease;


}




.project{


    margin-top:70px;


    padding:35px 60px;


    border-radius:25px;


    border:

    1px solid rgba(255,255,255,.15);


    background:

    rgba(255,255,255,.06);


    backdrop-filter:blur(15px);


    animation:

    float 4s infinite;


}





.chapter{


    font-size:13px;

    color:#888;

    letter-spacing:4px;


}




.project h2{


    margin-top:15px;

    font-size:38px;


}



.project p{


    margin-top:10px;

    color:#aaa;


}





.loading{


    position:absolute;

    bottom:50px;

    color:#777;

    letter-spacing:2px;


}





@keyframes fadeUp{


from{

    opacity:0;

    transform:
    translateY(40px);

}


to{

    opacity:1;

    transform:
    translateY(0);

}


}




@keyframes float{


0%,100%{

    transform:translateY(0);

}


50%{

    transform:translateY(-15px);

}


}




</style>


</head>


<body>


<div class="space">

<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>


</div>



<div class="portal"></div>




<div class="content">

<p>

</p>



</div>

</div>


</div>
